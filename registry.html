<!DOCTYPE html>
<html lang="en">

</head>
<body>

  <!-- ════════ NAVIGATION ════════ -->
  <nav class="site-nav grain">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="event.html">Event</a>
      <a href="travel.html">Travel</a>
      <a href="registry.html" class="active">Registry</a>
    </div>
    <a href="index.html#rsvp" class="nav-rsvp nav-rsvp-desktop">RSVP</a>
    <button class="hamburger" aria-label="Menu" onclick="toggleMenu()">
      <img src="images/icon/menu-18.svg" alt="Menu" width="18" height="18">
    </button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="event.html">Event</a>
    <a href="travel.html">Travel</a>

  <main class="registry-wrapper grain">

      <span class="line"></span>
    </div>

    <h1 class="coming-soon">Coming soon</h1>

  </main>

  <!-- No footer on registry page -->

  <script>
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }
    document.querySelectorAll('.mobile-menu a').forEach(function(a) {
      a.addEventListener('click', function() {
        document.getElementById('mobileMenu').classList.remove('open');
      });
    });
  </script>

</body>
