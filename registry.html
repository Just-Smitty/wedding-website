<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madison &amp; Ryan — Registry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ════════ NAVIGATION ════════ -->
  <nav class="site-nav grain">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="event.html">Event</a>
      <a href="travel.html">Travel</a>
      <a href="registry.html" class="active">Registry</a>
    </div>
    <a href="index.html#rsvp" class="nav-rsvp">RSVP</a>
    <button type="button" class="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobileMenu" onclick="toggleMenu()">
      <span class="hamburger-icons" aria-hidden="true">
        <img class="nav-menu-icon" src="images/icon/menu-18-on-dark.svg" alt="" width="18" height="18">
        <img class="nav-close-icon" src="images/icon/close-18.svg" alt="" width="18" height="18">
      </span>
    </button>
  </nav>
  <div class="mobile-menu" id="mobileMenu" role="dialog" aria-modal="true" aria-label="Navigation">
    <nav class="mobile-menu-links" aria-label="Main">
      <a href="index.html">Home</a>
      <a href="event.html">Event</a>
      <a href="travel.html">Travel</a>
      <a href="registry.html" class="active">Registry</a>
      <a href="index.html#rsvp">RSVP</a>
    </nav>
  </div>

  <!-- ════════ REGISTRY ════════ -->
  <main class="registry-wrapper grain">

    <div class="star-divider">
      <span class="line"></span>
      <img class="star-divider-mark" src="images/illustration/star-light.svg" alt="" width="77" height="24">
      <span class="line"></span>
    </div>

    <h1 class="coming-soon">Coming soon</h1>

  </main>

  <!-- No footer on registry page -->

  <script>
    function toggleMenu() {
      var menu = document.getElementById('mobileMenu');
      var btn = document.querySelector('.site-nav .hamburger');
      menu.classList.toggle('open');
      var open = menu.classList.contains('open');
      document.body.style.overflow = open ? 'hidden' : '';
      if (btn) {
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        btn.setAttribute('aria-label', open ? 'Close navigation menu' : 'Open navigation menu');
      }
    }
    document.querySelectorAll('.mobile-menu-links a').forEach(function(a) {
      a.addEventListener('click', function() {
        document.getElementById('mobileMenu').classList.remove('open');
        document.body.style.overflow = '';
        var btn = document.querySelector('.site-nav .hamburger');
        if (btn) {
          btn.setAttribute('aria-expanded', 'false');
          btn.setAttribute('aria-label', 'Open navigation menu');
        }
      });
    });
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Escape') return;
      var menu = document.getElementById('mobileMenu');
      if (!menu || !menu.classList.contains('open')) return;
      menu.classList.remove('open');
      document.body.style.overflow = '';
      var btn = document.querySelector('.site-nav .hamburger');
      if (btn) {
        btn.setAttribute('aria-expanded', 'false');
        btn.setAttribute('aria-label', 'Open navigation menu');
      }
    });
  </script>

</body>
</html>
