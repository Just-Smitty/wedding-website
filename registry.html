<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madison &amp; Ryan — Registry</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/illustration/heart.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0f241e">
</head>
<body>

  <!-- ════════ NAVIGATION ════════ -->
  <nav class="site-nav grain">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="event.html">Event</a>
      <a href="travel.html">Travel</a>
      <a href="registry.html" class="active">Registry</a>
    </div>
    <a href="index.html#rsvp" class="nav-rsvp">RSVP</a>
    <button type="button" class="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobileMenu" onclick="toggleMenu()">
      <span class="hamburger-icons" aria-hidden="true">
        <svg class="nav-menu-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 4L16 4" stroke="currentColor"/>
          <path d="M2 9L16 9" stroke="currentColor"/>
          <path d="M2 14L16 14" stroke="currentColor"/>
        </svg>
        <svg class="nav-close-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 3L15 15" stroke="currentColor"/>
          <path d="M3 15L15 3" stroke="currentColor"/>
        </svg>
      </span>
    </button>
  </nav>
  <div class="mobile-menu" id="mobileMenu" role="dialog" aria-modal="true" aria-label="Navigation">
    <nav class="mobile-menu-links" aria-label="Main">
      <a href="index.html">Home</a>
      <a href="event.html">Event</a>
      <a href="travel.html">Travel</a>
      <a href="registry.html" class="active">Registry</a>
    </nav>
  </div>

  <!-- ════════ REGISTRY ════════ -->
  <main class="registry-wrapper grain">

    <div class="star-divider">
      <span class="line"></span>
      <img class="star-divider-mark" src="images/illustration/star.svg" alt="" width="77" height="24">
      <span class="line"></span>
    </div>

    <h1 class="coming-soon">Coming soon</h1>

  </main>

  <!-- No footer on registry page -->

  <script>
    function toggleMenu() {
      var menu = document.getElementById('mobileMenu');
      var btn = document.querySelector('.site-nav .hamburger');
      var open = menu && menu.classList.contains('open');
      setMenuOpen(!open);
    }

    var lastMenuFocus = null;
    function getMenuFocusable() {
      var menu = document.getElementById('mobileMenu');
      if (!menu) return [];
      return Array.prototype.slice.call(menu.querySelectorAll('a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])'))
        .filter(function(el) { return el.offsetParent !== null; });
    }

    function setMenuOpen(open) {
      var menu = document.getElementById('mobileMenu');
      var btn = document.querySelector('.site-nav .hamburger');
      if (!menu) return;

      if (open) {
        lastMenuFocus = document.activeElement;
        menu.classList.add('open');
        document.body.style.overflow = 'hidden';
        if (btn) {
          btn.setAttribute('aria-expanded', 'true');
          btn.setAttribute('aria-label', 'Close navigation menu');
        }
        window.setTimeout(function() {
          var focusables = getMenuFocusable();
          if (focusables[0]) focusables[0].focus();
        }, 0);
      } else {
        menu.classList.remove('open');
        document.body.style.overflow = '';
        if (btn) {
          btn.setAttribute('aria-expanded', 'false');
          btn.setAttribute('aria-label', 'Open navigation menu');
        }
        if (lastMenuFocus && typeof lastMenuFocus.focus === 'function') {
          lastMenuFocus.focus();
        } else if (btn) {
          btn.focus();
        }
        lastMenuFocus = null;
      }
    }
    document.querySelectorAll('.mobile-menu-links a').forEach(function(a) {
      a.addEventListener('click', function() {
        setMenuOpen(false);
      });
    });
    document.addEventListener('keydown', function(e) {
      var menu = document.getElementById('mobileMenu');
      if (!menu || !menu.classList.contains('open')) return;

      if (e.key === 'Escape') {
        setMenuOpen(false);
        return;
      }

      if (e.key === 'Tab') {
        var focusables = getMenuFocusable();
        if (!focusables.length) return;
        var first = focusables[0];
        var last = focusables[focusables.length - 1];
        var active = document.activeElement;
        if (e.shiftKey && active === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && active === last) {
          e.preventDefault();
          first.focus();
        }
      }
    });
  </script>

</body>
</html>
